<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Third Place Finder - Lo-Fi Cafe</title>
    <!-- Pixel Art Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['VT323', 'monospace'],
                        title: ['Press Start 2P', 'cursive'],
                    },
                    colors: {
                        retro: {
                            bg: '#1e1e2e',
                            window: '#ffb6c1',
                            panel: '#2b2b45',
                            text: '#f8f8f2',
                            border: '#11111b',
                            accent: '#f9e2af',
                            btn: '#cbaacb'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-retro-bg text-retro-text h-screen w-screen overflow-hidden relative pixel-bg crt selection:bg-retro-accent selection:text-retro-border">

    <div class="h-full w-full flex flex-col md:flex-row relative z-10 gap-6 items-stretch">
        
        <!-- Left Pane: Chat Window -->
        <div id="left-pane" class="w-full md:w-[450px] flex flex-col h-[50vh] md:h-full shrink-0 relative transition-[width] duration-0">
            <!-- Window Header -->
            <header class="pixel-window-header bg-retro-panel p-3 border-b-4 border-retro-border flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="text-xl">👾</span>
                    <h1 class="text-[1.2rem] font-title text-retro-accent tracking-widest mt-1">THIRD_PLACE.EXE</h1>
                </div>
                <div class="flex gap-2">
                    <div class="w-4 h-4 bg-retro-window border-2 border-retro-border"></div>
                    <div class="w-4 h-4 bg-retro-accent border-2 border-retro-border"></div>
                    <div class="w-4 h-4 bg-red-400 border-2 border-retro-border"></div>
                </div>
            </header>

            <!-- Chat Area -->
            <div class="flex-1 flex flex-col min-h-0 relative bg-retro-window border-x-4 border-b-4 border-retro-border pixel-shadow overflow-hidden">
                <!-- Scanline overlay for chat -->
                <div class="absolute inset-0 pointer-events-none chat-scanlines opacity-20 Mix-blend-overlay"></div>
                
                <div id="chat-messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 scroll-smooth pb-32 z-10">
                    <!-- Messages injected here -->
                </div>
                
                <!-- Input Area -->
                <div class="absolute bottom-0 left-0 right-0 p-4 bg-retro-panel border-t-4 border-retro-border flex flex-col gap-3 z-10">
                    <div id="quick-replies" class="flex flex-wrap gap-2 justify-end">
                        <!-- Quick replies injected here -->
                    </div>
                    <form id="chat-form" class="flex items-center gap-2">
                        <span class="text-retro-accent font-title text-sm mr-1">>_</span>
                        <input type="text" id="chat-input" disabled placeholder="SELECT OPTION..." class="w-full px-3 py-2 bg-retro-border text-retro-accent border-2 border-retro-bg focus:outline-none focus:border-retro-window transition-all text-xl uppercase disabled:opacity-50">
                        <button type="submit" id="submit-btn" disabled class="p-2 bg-retro-btn text-retro-border border-4 border-retro-border hover:bg-white active:translate-y-1 active:shadow-none transition-all pixel-btn-shadow disabled:opacity-50 disabled:cursor-not-allowed uppercase font-bold px-4">
                            SEND
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Vertical Resizer 1 (Left/Middle) -->
        <div id="resizer-left" class="hidden md:flex w-4 cursor-col-resize items-center justify-center -mx-4 z-20 group">
            <div class="h-16 w-full max-w-[4px] bg-retro-border/20 group-hover:bg-retro-border/80 rounded transition-all"></div>
        </div>

        <!-- Middle Pane: Map & Results -->
        <div class="flex-1 flex flex-col h-[50vh] md:h-full gap-6 relative">
            <!-- Map Window -->
            <div class="pixel-shadow flex-1 flex flex-col border-4 border-retro-border relative bg-retro-panel">
                <header class="bg-retro-panel p-2 border-b-4 border-retro-border flex items-center justify-between">
                    <h2 class="text-sm font-title text-retro-window mt-1">MAP_VIEWER.SYS</h2>
                </header>
                <div class="flex-1 relative overflow-hidden retro-map-filter" id="map-wrapper">
                    <!-- Map Controls -->
                    <div class="absolute top-2 left-2 z-20 flex flex-wrap gap-2 bg-retro-panel/95 p-2 border-2 border-retro-border shadow-lg">
                        <button id="toggle-map-theme" class="px-2 py-1 text-xs uppercase font-bold bg-retro-btn border-2 border-retro-border hover:bg-white">LIGHT MODE</button>
                        <button id="locate-btn" class="px-2 py-1 text-xs uppercase font-bold bg-retro-btn border-2 border-retro-border hover:bg-white">LOCATE ME</button>
                        <button id="toggle-global-contrast" class="px-2 py-1 text-xs uppercase font-bold bg-retro-btn border-2 border-retro-border hover:bg-white">HIGH CONTRAST</button>
                        <input id="map-search" type="text" placeholder="Search places..." class="text-xs px-2 py-1 bg-retro-bg border-2 border-retro-border text-retro-text w-44" />
                    </div>
                    <div id="map" class="w-full h-full z-0"></div>
                    <!-- Overlay -->
                    <div id="map-overlay" class="absolute inset-0 bg-retro-border/80 z-10 flex flex-col items-center justify-center transition-opacity duration-500 text-center px-8 border-t-4 border-retro-border">
                        <span class="text-6xl mb-4 animate-bounce">🌍</span>
                        <h2 class="text-2xl font-title text-retro-accent mb-4 leading-relaxed">AWAITING<br>INPUT</h2>
                    </div>
                </div>
            </div>
            
            <!-- Result Window -->
            <div id="results-container" class="pixel-shadow max-h-[40%] bg-retro-window border-4 border-retro-border hidden flex flex-col">
                <header class="bg-retro-panel p-2 border-b-4 border-retro-border text-center">
                    <h2 class="text-sm font-title text-retro-accent mt-1">MATCHED_SPOTS.DAT</h2>
                </header>
                <div id="results-list" class="flex-1 overflow-y-auto p-4 space-y-4">
                    <!-- Cards injected here -->
                </div>
            </div>
        </div>

        <!-- Vertical Resizer 2 (Middle/Right) -->
        <div id="resizer-right" class="hidden md:flex w-4 cursor-col-resize items-center justify-center -mx-4 z-20 group">
            <div class="h-16 w-full max-w-[4px] bg-retro-border/20 group-hover:bg-retro-border/80 rounded transition-all"></div>
        </div>

        <!-- Right Pane: Virtual Cafe Mixer -->
        <div id="right-pane" class="w-full md:w-[320px] flex flex-col h-auto md:h-full shrink-0 pixel-shadow border-4 border-retro-border bg-retro-panel relative transition-[width] duration-0">
            <header class="bg-retro-bg p-3 border-b-4 border-retro-border text-center">
                <h2 class="text-sm font-title text-[#a2e4b8] mt-1">VIRTUAL CAFE MIXER</h2>
            </header>
            
            <!-- Lo-Fi Music Player -->
            <div class="p-4 border-b-4 border-retro-border bg-[#11111b]">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-12 h-12 bg-retro-accent border-2 border-retro-border flex items-center justify-center animate-pulse">
                        <span class="text-2xl">📻</span>
                    </div>
                    <div>
                        <p class="font-title text-[0.6rem] text-retro-window leading-tight mb-1">NOW PLAYING</p>
                        <p class="text-xl text-retro-text leading-tight truncate w-32">Chill Lofi Mix</p>
                    </div>
                </div>
                <div class="flex items-center gap-2 mt-3">
                    <button id="play-music-btn" class="bg-retro-btn border-2 border-retro-border px-3 py-1 text-retro-border font-bold hover:bg-white retro-active">PLAY</button>
                    <input type="range" id="vol-music" class="pixel-range flex-1" min="0" max="1" step="0.05" value="0.5">
                </div>
                <audio id="audio-music" loop>
                    <source src="sounds/music.mp3" type="audio/mpeg">
                </audio>
            </div>

            <!-- Ambient Sliders -->
            <div class="p-4 flex-1 flex flex-col gap-5 overflow-y-auto bg-retro-panel">
                
                <div class="ambient-control">
                    <div class="flex justify-between items-end mb-1">
                        <span class="text-xl text-[#ffb6c1]">🌧️ Rain</span>
                    </div>
                    <input type="range" id="vol-rain" class="pixel-range w-full" min="0" max="1" step="0.05" value="0">
                    <audio id="audio-rain" loop>
                        <source src="sounds/rain.mp3" type="audio/mpeg">
                    </audio>
                </div>

                <div class="ambient-control">
                    <div class="flex justify-between items-end mb-1">
                        <span class="text-xl text-[#f9e2af]">☕ Cafe Chatter</span>
                    </div>
                    <input type="range" id="vol-chatter" class="pixel-range w-full" min="0" max="1" step="0.05" value="0">
                    <audio id="audio-chatter" loop>
                        <source src="sounds/chatter.mp3" type="audio/mpeg">
                    </audio>
                </div>

                <div class="ambient-control">
                    <div class="flex justify-between items-end mb-1">
                        <span class="text-xl text-[#a2e4b8]">🔥 Fireplace</span>
                    </div>
                    <input type="range" id="vol-fire" class="pixel-range w-full" min="0" max="1" step="0.05" value="0">
                    <audio id="audio-fire" loop>
                        <source src="sounds/fire.mp3" type="audio/mpeg">
                    </audio>
                </div>
                
                <div class="ambient-control">
                    <div class="flex justify-between items-end mb-1">
                        <span class="text-xl text-[#cbaacb]">🌃 Street Ambience</span>
                    </div>
                    <input type="range" id="vol-street" class="pixel-range w-full" min="0" max="1" step="0.05" value="0">
                    <audio id="audio-street" loop>
                        <source src="sounds/street.mp3" type="audio/mpeg">
                    </audio>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
